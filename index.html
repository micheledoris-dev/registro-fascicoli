<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archivio v7.7 - Stable</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { background-color: #f3f4f6; }
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 999; align-items: center; justify-content: center; }
        #modal.active { display: flex; }
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; position: absolute; top:0; left:0; width:100%; text-align:center; }
        }
        .print-only { display: none; }
    </style>
</head>
<body class="p-4">

<div id="print-area" class="print-only">
    <div style="font-size: 80px; font-weight: 900; margin-top: 100px;" id="p-rip"></div>
    <div style="font-size: 140px; font-weight: 900; border-top: 10px solid black; padding-top: 50px;" id="p-gru"></div>
</div>

<div class="max-w-7xl mx-auto no-print">
    <div class="flex justify-between items-center mb-6 bg-white p-6 rounded-2xl shadow-sm">
        <h1 class="text-2xl font-bold">📁 Archivio Fascicoli</h1>
        <div class="flex gap-2">
            <button onclick="document.getElementById('file-in').click()" class="bg-gray-200 px-4 py-2 rounded-lg font-bold text-sm">IMPORTA</button>
            <button onclick="openModal()" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold shadow-lg hover:bg-blue-700">＋ NUOVO</button>
        </div>
    </div>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
        <div class="bg-white p-5 rounded-xl border-b-4 border-blue-500 shadow-sm">
            <p class="text-xs font-bold text-gray-400 uppercase">Totali</p>
            <h3 id="stat-total" class="text-2xl font-black">0</h3>
        </div>
        <div class="bg-white p-5 rounded-xl border-b-4 border-orange-500 shadow-sm">
            <p class="text-xs font-bold text-gray-400 uppercase">Prelevati</p>
            <h3 id="stat-out" class="text-2xl font-black text-orange-600">0</h3>
        </div>
        <div class="bg-white p-5 rounded-xl border-b-4 border-green-500 shadow-sm">
            <p class="text-xs font-bold text-gray-400 uppercase">In Archivio</p>
            <h3 id="stat-in" class="text-2xl font-black text-green-600">0</h3>
        </div>
        <div class="bg-white p-5 rounded-xl border-b-4 border-purple-500 shadow-sm">
            <p class="text-xs font-bold text-gray-400 uppercase">Gruppi Reali</p>
            <h3 id="stat-groups" class="text-2xl font-black text-purple-600">0</h3>
        </div>
    </div>

    <input type="text" id="search" placeholder="Cerca posizione o numero..." onkeyup="filter()" class="w-full p-4 rounded-xl border mb-6 shadow-inner outline-none focus:ring-2 focus:ring-blue-500">

    <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
        <table class="w-full text-left border-collapse">
            <thead class="bg-gray-100 text-[10px] font-bold uppercase text-gray-500">
                <tr>
                    <th class="p-4">Fascicolo</th>
                    <th class="p-4">Posizione</th>
                    <th class="p-4">Stato</th>
                    <th class="p-4 text-right">Azioni</th>
                </tr>
            </thead>
            <tbody id="table-body" class="divide-y divide-gray-100"></tbody>
        </table>
    </div>
</div>

<div id="modal">
    <div class="bg-white p-8 rounded-3xl w-full max-w-lg mx-4 shadow-2xl">
        <h2 class="text-xl font-bold mb-6">Dettagli Fascicolo</h2>
        <div class="grid grid-cols-2 gap-4">
            <input type="text" id="m-num" placeholder="Numero" class="p-3 border rounded-xl">
            <input type="text" id="m-anno" placeholder="Anno" class="p-3 border rounded-xl">
            <input type="text" id="m-reg" placeholder="Registro" class="p-3 border rounded-xl">
            <input type="text" id="m-rip" placeholder="Ripiano" class="p-3 border rounded-xl bg-blue-50">
            <input type="text" id="m-gru" placeholder="Gruppo" class="p-3 border rounded-xl bg-blue-50">
            <select id="m-stato" class="p-3 border rounded-xl">
                <option value="In archivio">📦 In archivio</option>
                <option value="Prelevato">🏃 Prelevato</option>
            </select>
        </div>
        <div class="flex justify-end gap-3 mt-8">
            <button onclick="closeModal()" class="text-gray-400 font-bold">Chiudi</button>
            <button onclick="save()" class="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold">SALVA</button>
        </div>
    </div>
</div>

<input type="file" id="file-in" class="hidden" onchange="importXLS(event)">

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyC4PA_joHtGFRudPUYBOQAMrOgVearBt3I",
      authDomain: "archivio-sentenze.firebaseapp.com",
      databaseURL: "https://archivio-sentenze-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "archivio-sentenze",
      storageBucket: "archivio-sentenze.firebasestorage.app",
      messagingSenderId: "139447095387",
      appId: "1:139447095387:web:32d031468fa4c74a83af7e"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('sentenze');
    let fullData = [];
    let editKey = null;

    db.on('value', (snap) => {
        const val = snap.val();
        fullData = val ? Object.keys(val).map(k => ({...val[k], fbKey: k})) : [];
        fullData.sort((a,b) => new Date(b.dataRaw || 0) - new Date(a.dataRaw || 0));
        render();
        stats();
    });

    function render() {
        document.getElementById('table-body').innerHTML = fullData.map(i => `
            <tr class="hover:bg-gray-50">
                <td class="p-4 font-bold text-blue-600">${i.num || ''}/${i.anno || ''}</td>
                <td class="p-4"><b>${i.ripiano || '-'}</b><br><span class="text-xs text-gray-400">${i.gruppo || '-'}</span></td>
                <td class="p-4 text-xs font-bold uppercase ${i.stato === 'Prelevato' ? 'text-orange-500' : 'text-green-600'}">${i.stato || 'In archivio'}</td>
                <td class="p-4 text-right space-x-3">
                    <button onclick="printA4('${i.ripiano}', '${i.gruppo}')" class="text-lg">🖨️</button>
                    <button onclick="openModal('${i.fbKey}')" class="text-lg">✏️</button>
                    <button onclick="del('${i.fbKey}')" class="text-lg text-red-300">🗑️</button>
                </td>
            </tr>
        `).join('');
    }

    function stats() {
        document.getElementById('stat-total').innerText = fullData.length;
        document.getElementById('stat-out').innerText = fullData.filter(x => x.stato === 'Prelevato').length;
        document.getElementById('stat-in').innerText = fullData.filter(x => x.stato !== 'Prelevato').length;
        
        // CONTEGGIO GRUPPI REALI
        const gUnici = [...new Set(fullData.map(x => x.gruppo ? x.gruppo.toString().trim() : "").filter(g => g !== "" && g !== "-" && g !== "0"))];
        document.getElementById('stat-groups').innerText = gUnici.length;
    }

    function openModal(key = null) {
        editKey = key;
        if (key) {
            const i = fullData.find(x => x.fbKey === key);
            document.getElementById('m-num').value = i.num || "";
            document.getElementById('m-anno').value = i.anno || "";
            document.getElementById('m-reg').value = i.reg || "";
            document.getElementById('m-rip').value = i.ripiano || "";
            document.getElementById('m-gru').value = i.gruppo || "";
            document.getElementById('m-stato').value = i.stato || "In archivio";
        } else {
            document.querySelectorAll('#modal input').forEach(el => el.value = "");
        }
        document.getElementById('modal').classList.add('active');
    }

    function closeModal() { document.getElementById('modal').classList.remove('active'); }

    function save() {
        const d = {
            num: document.getElementById('m-num').value,
            anno: document.getElementById('m-anno').value,
            reg: document.getElementById('m-reg').value,
            ripiano: document.getElementById('m-rip').value,
            gruppo: document.getElementById('m-gru').value,
            stato: document.getElementById('m-stato').value,
            dataRaw: new Date().toISOString()
        };
        if (editKey) db.child(editKey).update(d);
        else db.push(d);
        closeModal();
    }

    function printA4(r, g) {
        document.getElementById('p-rip').innerText = r;
        document.getElementById('p-gru').innerText = g;
        window.print();
    }

    function importXLS(e) {
        const r = new FileReader();
        r.onload = (evt) => {
            const data = new Uint8Array(evt.target.result);
            const wb = XLSX.read(data, {type: 'array'});
            const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header: 1});
            rows.slice(1).forEach(row => {
                if(row[0]) db.push({
                    num: row[0]||"", anno: row[1]||"", reg: row[2]||"", 
                    ripiano: row[3]||"", gruppo: row[4]||"", 
                    stato: row[5]||"In archivio", dataRaw: new Date().toISOString()
                });
            });
        };
        r.readAsArrayBuffer(e.target.files[0]);
    }

    function filter() {
        const v = document.getElementById('search').value.toLowerCase();
        document.querySelectorAll('#table-body tr').forEach(r => r.style.display = r.innerText.toLowerCase().includes(v) ? '' : 'none');
    }

    function del(k) { if(confirm("Eliminare?")) db.child(k).remove(); }
</script>
</body>
</html>
