<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archivio Pro v7.1 - Fix</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.1/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { background-color: #F8F9FA; font-family: sans-serif; }
        .stat-card { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-left: 5px solid #3B82F6; }
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 50; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        #modal.active { display: flex; }
        #reader { width: 100%; max-width: 400px; margin: auto; }
        @media print { .no-print { display: none !important; } #print-area { display: block !important; } }
    </style>
</head>
<body class="p-4 md:p-10">

<div class="max-w-7xl mx-auto no-print">
    <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-6">
        <div>
            <h1 class="text-3xl font-extrabold text-gray-900">📁 Archivio Fascicoli Pro</h1>
            <p class="text-gray-500 mt-1">Gestione avanzata e scanner QR</p>
        </div>
        <div class="flex flex-wrap gap-3">
            <button onclick="startScanner()" class="bg-indigo-600 text-white px-5 py-2.5 rounded-xl font-bold hover:bg-indigo-700 transition">📸 SCANNER QR</button>
            <button onclick="document.getElementById('file-in').click()" class="bg-white border border-gray-200 px-5 py-2.5 rounded-xl font-semibold hover:bg-gray-50 transition">Importa</button>
            <button onclick="exportExcel()" class="bg-white border border-gray-200 px-5 py-2.5 rounded-xl font-semibold hover:bg-gray-50 transition">Esporta</button>
            <button onclick="openModal()" class="bg-blue-600 text-white px-8 py-2.5 rounded-xl font-bold hover:bg-blue-700 transition shadow-lg">＋ NUOVO</button>
        </div>
    </header>

    <div id="reader-container" class="mb-8 hidden bg-black p-4 rounded-3xl relative">
        <button onclick="stopScanner()" class="absolute top-4 right-4 text-white font-bold z-10 bg-red-500 w-8 h-8 rounded-full">✕</button>
        <div id="reader"></div>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-10">
        <div class="stat-card">
            <p class="text-xs font-bold text-gray-400 uppercase">Fascicoli Totali</p>
            <h3 id="stat-total" class="text-3xl font-black text-gray-800">
