<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Archivio Smart - Mobile Ready</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0b0b; --card-bg: #161616; --accent: #e8c97a; --text-main: #f0ece0; --text-dim: #a09880; --border: #262626; --red: #e05555; --green: #5aad7a; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text-main); display: flex; min-height: 100vh; }
        
        /* Sidebar adattiva */
        .sidebar { width: 260px; background: #111; border-right: 1px solid var(--border); padding: 24px; position: fixed; height: 100vh; z-index: 100; transition: 0.3s; }
        .main { flex: 1; margin-left: 260px; padding: 20px; width: calc(100% - 260px); }

        /* Stile Tabelle/Card per Mobile */
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); width: 0; padding: 0; }
            .main { margin-left: 0; width: 100%; padding: 10px; }
            .stats-grid { grid-template-columns: 1fr 1fr !important; gap: 10px !important; }
            .form-grid { grid-template-columns: 1fr !important; }
            
            /* Trasforma tabella in Card */
            thead { display: none; }
            tr { display: block; background: var(--card-bg); margin-bottom: 15px; border-radius: 12px; border: 1px solid var(--border); padding: 15px; position: relative; }
            td { display: block; padding: 5px 0 !important; border: none !important; text-align: left !important; }
            td:before { content: attr(data-label); font-size: 10px; color: var(--text-dim); display: block; text-transform: uppercase; }
            .actions-cell { display: flex; gap: 20px; margin-top: 10px; border-top: 1px solid #333 !important; padding-top: 10px !important; }
        }

        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 20px; }
        .stat-card { background: var(--card-bg); padding: 15px; border-radius: 12px; border: 1px solid var(--border); border-left: 4px solid var(--accent); }
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: bold; }
        .badge-fuori { background: rgba(224,85,85,0.2); color: #ff6b6b; border: 1px solid var(--red); }
        .btn-add { background: var(--accent); color: black; border: none; padding: 12px; border-radius: 8px; font-weight: 700; cursor: pointer; width: 100%; }
        
        #print-area { display: none; text-align: center; background: white; color: black; padding: 40px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">ARCHIVIO SMART<br><span style="font-size: 10px; opacity: 0.6;">v. Mobile 2026</span></div>
        <div class="nav-item active" onclick="showPage('dashboard')">🏠 Dashboard</div>
        <div class="nav-item" onclick="showPage('lista')">📂 Registro</div>
        <div class="nav-item" onclick="showPage('qr-sect')">🖨️ Etichette</div>
        <div class="nav-item" onclick="showPage('import')">📥 Importa</div>
    </div>

    <div class="main">
        <div id="page-dashboard" class="page active">
            <div class="stats-grid">
                <div class="stat-card"><div>Tot</div><div class="stat-val" style="font-size:22px" id="st-tot">0</div></div>
                <div class="stat-card" style="border-left-color: var(--green);"><div>In Sede</div><div class="stat-val" style="font-size:22px" id="st-sede">0</div></div>
                <div class="stat-card" style="border-left-color: var(--red);"><div>Fuori</div><div class="stat-val" style="font-size:22px" id="st-fuori">0</div></div>
                <div class="stat-card" style="border-left-color: #5a8fad;"><div>Gruppi</div><div class="stat-val" style="font-size:22px" id="st-gruppi">0</div></div>
            </div>
            <div class="content-card" id="mini-lista-cont"><h3>Ultimi Movimenti</h3><table id="mini-lista"></table></div>
        </div>

        <div id="page-lista" class="page">
            <div class="content-card">
                <div class="form-grid" id="form-inp">
                    <input type="text" id="newNum" placeholder="Numero Fascicolo">
                    <input type="text" id="newAnno" placeholder="Anno (Es: 2024)">
                    <input list="gruppi-list" id="newGruppo" placeholder="Ripiano/Gruppo">
                    <input type="hidden" id="editIdx" value="-1">
                    <button class="btn-add" id="btnSave" onclick="salva()">Salva</button>
                </div>
                <hr style="margin: 15px 0; opacity: 0.1;">
                <input type="text" id="search" placeholder="🔍 Cerca Numero, Anno o Dottore..." onkeyup="filter()" style="background:transparent; border: 1px solid var(--accent); color: white; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 15px;">
                <table>
                    <thead><tr><th>Fascicolo</th><th>Ripiano</th><th>Stato</th><th>Note</th><th>Azioni</th></tr></thead>
                    <tbody id="full-lista"></tbody>
                </table>
            </div>
        </div>

        <div id="page-qr-sect" class="page"><h1>QR Ripiani</h1><div id="lista-qr-gruppi"></div></div>
        <div id="page-import" class="page"><h1>Importa</h1><input type="file" id="fileX" onchange="importa(this)"><button class="btn-add" onclick="document.getElementById('fileX').click()">Carica Excel</button></div>
    </div>

    <div id="print-area"><h1 id="p-title"></h1><div id="qrcode"></div></div>

    <script>
        // Le funzioni core rimangono identiche per stabilità, cambiamo solo il rendering della tabella
        function render() {
            const db = JSON.parse(localStorage.getItem('sentenze_db') || '[]');
            document.getElementById('st-tot').innerText = db.length;
            document.getElementById('st-sede').innerText = db.filter(x => x.Stato !== 'Prelevato').length;
            document.getElementById('st-fuori').innerText = db.filter(x => x.Stato === 'Prelevato').length;
            document.getElementById('st-gruppi').innerText = [...new Set(db.map(x => x.Gruppo))].filter(x => x).length;

            document.getElementById('full-lista').innerHTML = db.map((f, i) => `
                <tr>
                    <td data-label="Fascicolo"><b>${f.Numero || f.N_Sentenza} / ANNO ${f.Anno}</b></td>
                    <td data-label="Ripiano">${f.Gruppo || '-'}</td>
                    <td data-label="Stato"><span class="badge ${f.Stato === 'Prelevato' ? 'badge-fuori' : 'badge-sede'}">${f.Stato === 'Prelevato' ? 'FUORI' : 'IN SEDE'}</span></td>
                    <td data-label="Note/Possesso" style="font-size:11px; color:var(--text-dim)">${f.Note || '-'}</td>
                    <td class="actions-cell">
                        <span onclick="gestisciMovimento(${i})" style="cursor:pointer; font-size:20px">🤝</span>
                        <span onclick="preparaMod(${i})" style="cursor:pointer; font-size:20px">✏️</span>
                        <span onclick="elimina(${i})" style="cursor:pointer; font-size:20px">🗑️</span>
                    </td>
                </tr>
            `).join('');
        }

        // Funzione movimento aggiornata per essere più "touch-friendly"
        function gestisciMovimento(i) {
            let db = JSON.parse(localStorage.getItem('sentenze_db'));
            const f = db[i];
            const oggi = new Date().toLocaleString('it-IT', {day:'2-digit', month:'2-digit', year:'numeric'});

            if (f.Stato !== "Prelevato") {
                const dott = prompt("Consegna Fascicolo " + f.Numero + "/" + f.Anno + " a:");
                if (dott) { f.Stato = "Prelevato"; f.Note = "Preso da " + dott.toUpperCase() + " il " + oggi; }
            } else {
                if (confirm("Rientro in sede?")) { f.Stato = "In sede"; f.Note = "Rientrato il " + oggi; }
            }
            localStorage.setItem('sentenze_db', JSON.stringify(db));
            render();
        }

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + id).classList.add('active');
            render();
            if(id === 'qr-sect') renderQRList();
        }

        function salva() {
            const n = document.getElementById('newNum').value, a = document.getElementById('newAnno').value, g = document.getElementById('newGruppo').value;
            const idx = parseInt(document.getElementById('editIdx').value);
            if(!n || !a) return alert("Inserisci Numero e Anno!");
            let db = JSON.parse(localStorage.getItem('sentenze_db') || '[]');
            if (idx === -1) db.unshift({"Numero":n, "Anno":a, "Gruppo":g, "Stato":"In sede"});
            else { db[idx].Numero = n; db[idx].Anno = a; db[idx].Gruppo = g; }
            localStorage.setItem('sentenze_db', JSON.stringify(db));
            document.getElementById('newNum').value=''; document.getElementById('newAnno').value=''; document.getElementById('editIdx').value='-1';
            render();
        }

        function filter() {
            const v = document.getElementById('search').value.toLowerCase();
            document.querySelectorAll('#full-lista tr').forEach(r => r.style.display = r.innerText.toLowerCase().includes(v) ? '' : 'none');
        }

        function renderQRList() {
            const db = JSON.parse(localStorage.getItem('sentenze_db') || '[]');
            const gruppi = [...new Set(db.map(x => x.Gruppo))].filter(x => x);
            document.getElementById('lista-qr-gruppi').innerHTML = gruppi.map(g => `<div class="content-card" style="display:flex; justify-content:space-between; align-items:center"><b>${g}</b><button onclick="stampa('${g}')" style="width:auto" class="btn-add">STAMPA</button></div>`).join('');
        }

        function stampa(g) {
            const printArea = document.getElementById('print-area');
            document.getElementById('p-title').innerText = g;
            document.getElementById('qrcode').innerHTML = "";
            printArea.style.display = 'block';
            new QRCode(document.getElementById("qrcode"), { text: window.location.href.split('?')[0] + "?cerca=" + encodeURIComponent(g), width: 250, height: 250 });
            setTimeout(() => { window.print(); printArea.style.display = 'none'; }, 1000);
        }

        function importa(input) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const data = new Uint8Array(e.target.result);
                const wb = XLSX.read(data, {type: 'array'});
                localStorage.setItem('sentenze_db', JSON.stringify(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]])));
                render(); showPage('dashboard');
            };
            reader.readAsArrayBuffer(input.files[0]);
        }

        function preparaMod(i) {
            const f = JSON.parse(localStorage.getItem('sentenze_db'))[i];
            document.getElementById('newNum').value = f.Numero || f.N_Sentenza;
            document.getElementById('newAnno').value = f.Anno;
            document.getElementById('newGruppo').value = f.Gruppo;
            document.getElementById('editIdx').value = i;
            document.getElementById('btnSave').innerText = "Aggiorna";
            window.scrollTo(0,0);
        }

        function elimina(i) { if(confirm("Eliminare?")) { let db = JSON.parse(localStorage.getItem('sentenze_db')); db.splice(i,1); localStorage.setItem('sentenze_db', JSON.stringify(db)); render(); } }

        window.onload = () => {
            render();
            const urlParams = new URLSearchParams(window.location.search);
            if(urlParams.has('cerca')) { 
                document.getElementById('search').value = urlParams.get('cerca'); 
                filter(); 
                showPage('lista'); 
            }
        };
    </script>
</body>
</html>
