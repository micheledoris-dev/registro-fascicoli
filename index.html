<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archivio Fascicoli Pro - V4</title>
    
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.1/qrcode.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { background-color: #F5F5F7; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.3); border-radius: 20px; }
        .apple-btn { transition: all 0.2s; border-radius: 12px; }
        .apple-btn:active { transform: scale(0.96); }
        @media print { .no-print { display: none !important; } #print-area { display: block !important; } }
        #print-area { display: none; text-align: center; padding-top: 50px; }
    </style>
</head>
<body class="p-4 md:p-10">

<div class="max-w-6xl mx-auto no-print">
    <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
        <h1 class="text-3xl font-bold tracking-tight">📁 Archivio Fascicoli</h1>
        <div class="flex gap-2">
            <button onclick="document.getElementById('file-input').click()" class="apple-btn bg-white border px-4 py-2 text-sm font-medium shadow-sm">Importa Excel</button>
            <button onclick="exportExcel()" class="apple-btn bg-black text-white px-4 py-2 text-sm font-medium">Esporta Excel</button>
            <button onclick="openModal()" class="apple-btn bg-blue-600 text-white px-6 py-2 text-sm font-medium">＋ Nuovo</button>
        </div>
    </header>

    <div class="glass p-4 mb-8 shadow-sm">
        <input type="text" id="search" placeholder="Cerca per numero, anno o gruppo..." onkeyup="searchTable()" class="w-full bg-transparent border-none outline-none text-lg">
    </div>

    <div class="glass overflow-hidden shadow-xl">
        <table class="w-full text-left border-collapse">
            <thead class="bg-gray-100/50">
                <tr>
                    <th class="p-4 text-xs font-bold uppercase text-gray-400">Fascicolo / Anno</th>
                    <th class="p-4 text-xs font-bold uppercase text-gray-400">Registro</th>
                    <th class="p-4 text-xs font-bold uppercase text-gray-400">Gruppo</th>
                    <th class="p-4 text-xs font-bold uppercase text-gray-400">Stato Log</th>
                    <th class="p-4 text-xs font-bold uppercase text-gray-400 text-right">Azioni</th>
                </tr>
            </thead>
            <tbody id="table-body" class="divide-y divide-gray-100"></tbody>
        </table>
    </div>
</div>

<div id="modal" class="fixed inset-0 bg-black/40 backdrop-blur-sm hidden items-center justify-center z-50 no-print">
    <div class="glass p-8 w-full max-w-lg mx-4">
        <h2 id="modal-title" class="text-xl font-bold mb-6">Dettagli Fascicolo</h2>
        <div class="grid grid-cols-2 gap-4">
            <input type="text" id="m-num" placeholder="Numero" class="p-3 border rounded-xl">
            <input type="text" id="m-anno" placeholder="Anno" class="p-3 border rounded-xl">
            <input type="text" id="m-reg" placeholder="Registro" class="p-3 border rounded-xl">
            <input type="text" id="m-gruppo" placeholder="Gruppo" class="p-3 border rounded-xl">
            <textarea id="m-note" placeholder="Note" class="p-3 border rounded-xl col-span-2"></textarea>
            <div class="col-span-2 border-t pt-4 mt-2"><p class="text-xs font-bold text-gray-400 mb-2 uppercase">Log Movimentazione</p></div>
            <input type="text" id="m-p-nome" placeholder="Chi preleva" class="p-3 border rounded-xl">
            <input type="date" id="m-p-data" class="p-3 border rounded-xl">
            <input type="text" id="m-r-nome" placeholder="Chi ripone" class="p-3 border rounded-xl">
            <input type="date" id="m-r-data" class="p-3 border rounded-xl">
        </div>
        <div class="flex justify-end gap-3 mt-8">
            <button onclick="closeModal()" class="px-6 py-2 text-sm font-medium text-gray-500">Annulla</button>
            <button onclick="saveRecord()" class="apple-btn bg-blue-600 text-white px-8 py-2 text-sm font-medium">Salva</button>
        </div>
    </div>
</div>

<div id="print-area">
    <h1 id="print-gruppo-nome" style="font-size: 48px; font-weight: bold; margin-bottom: 20px;"></h1>
    <div id="print-qr" style="display: flex; justify-content: center;"></div>
</div>

<input type="file" id="file-input" class="hidden" onchange="importExcel(event)">

<script>
    let db = JSON.parse(localStorage.getItem('archivio_v4')) || [];
    let editId = null;

    function render() {
        const body = document.getElementById('table-body');
        body.innerHTML = db.map(f => `
            <tr class="hover:bg-white/50 transition">
                <td class="p-4 font-bold text-blue-600">${f.num} / ${f.anno}</td>
                <td class="p-4 text-gray-600">${f.reg}</td>
                <td class="p-4">
                    <button onclick="printGroup('${f.gruppo}')" class="bg-gray-200 px-3 py-1 rounded-full text-xs font-bold hover:bg-gray-300">QR ${f.gruppo}</button>
                </td>
                <td class="p-4 text-xs text-gray-500">
                    OUT: ${f.p_nome || '-'} (${f.p_data || '-'})<br>
                    IN: ${f.r_nome || '-'} (${f.r_data || '-'})
                </td>
                <td class="p-4 text-right space-x-2">
                    <button onclick="secureAction('edit', ${f.id})" class="text-gray-400 hover:text-black">✏️</button>
                    <button onclick="secureAction('delete', ${f.id})" class="text-red-400 hover:text-red-600">🗑️</button>
                </td>
            </tr>
        `).join('');
    }

    function secureAction(type, id) {
        if(confirm("Sei sicuro? (Passaggio 1/2)")) {
            let pass = prompt("Scrivi CONFERMA per procedere (Passaggio 2/2):");
            if(pass === "CONFERMA") {
                if(type === 'delete') { db = db.filter(x => x.id !== id); save(); }
                if(type === 'edit') openModal(id);
            }
        }
    }

    function openModal(id = null) {
        editId = id;
        if(id) {
            let f = db.find(x => x.id === id);
            document.getElementById('m-num').value = f.num;
            document.getElementById('m-anno').value = f.anno;
            document.getElementById('m-reg').value = f.reg;
            document.getElementById('m-gruppo').value = f.gruppo;
            document.getElementById('m-note').value = f.note;
            document.getElementById('m-p-nome').value = f.p_nome;
            document.getElementById('m-p-data').value = f.p_data;
            document.getElementById('m-r-nome').value = f.r_nome;
            document.getElementById('m-r-data').value = f.r_data;
        } else {
            document.querySelectorAll('#modal input, #modal textarea').forEach(i => i.value = '');
        }
        document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    function saveRecord() {
        let data = {
            id: editId || Date.now(),
            num: document.getElementById('m-num').value,
            anno: document.getElementById('m-anno').value,
            reg: document.getElementById('m-reg').value,
            gruppo: document.getElementById('m-gruppo').value,
            note: document.getElementById('m-note').value,
            p_nome: document.getElementById('m-p-nome').value,
            p_data: document.getElementById('m-p-data').value,
            r_nome: document.getElementById('m-r-nome').value,
            r_data: document.getElementById('m-r-data').value
        };
        if(editId) db = db.map(x => x.id === editId ? data : x);
        else db.push(data);
        save();
        closeModal();
    }

    function save() { localStorage.setItem('archivio_v4', JSON.stringify(db)); render(); }

    function printGroup(gruppo) {
        document.getElementById('print-gruppo-nome').innerText = "GRUPPO: " + gruppo;
        document.getElementById('print-qr').innerHTML = "";
        new QRCode(document.getElementById("print-qr"), { text: gruppo, width: 250, height: 250 });
        setTimeout(() => { window.print(); }, 500);
    }

    function searchTable() {
        let val = document.getElementById('search').value.toLowerCase();
        let rows = document.querySelectorAll('#table-body tr');
        rows.forEach(r => r.style.display = r.innerText.toLowerCase().includes(val) ? '' : 'none');
    }

    function exportExcel() {
        let ws = XLSX.utils.json_to_sheet(db);
        let wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Fascicoli");
        XLSX.writeFile(wb, "archivio_fascicoli.xlsx");
    }

    function importExcel(e) {
        let reader = new FileReader();
        reader.onload = (evt) => {
            let data = new Uint8Array(evt.target.result);
            let wb = XLSX.read(data, {type: 'array'});
            db = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
            save();
        };
        reader.readAsArrayBuffer(e.target.files[0]);
    }

    render();
</script>
</body>
</html>
