<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Archivio Smart Cloud</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0b0b; --card-bg: #161616; --accent: #e8c97a; --text-main: #f0ece0; --text-dim: #a09880; --border: #262626; --red: #e05555; --green: #5aad7a; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text-main); min-height: 100vh; }
        .sidebar { width: 260px; background: #111; border-right: 1px solid var(--border); padding: 24px; position: fixed; height: 100vh; z-index: 100; }
        .main { margin-left: 260px; padding: 20px; width: calc(100% - 260px); }
        @media (max-width: 900px) { .sidebar { display: none; } .main { margin-left: 0; width: 100%; padding: 15px; } .stats-grid { grid-template-columns: 1fr 1fr !important; } }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: var(--card-bg); padding: 15px; border-radius: 12px; border: 1px solid var(--border); border-left: 4px solid var(--accent); }
        .stat-val { font-size: 24px; font-weight: 700; color: white; }
        .content-card { background: var(--card-bg); border-radius: 12px; border: 1px solid var(--border); padding: 15px; margin-bottom: 20px; }
        input { background: #0b0b0b; border: 1px solid var(--border); padding: 12px; border-radius: 8px; color: white; width: 100%; margin-bottom: 8px; font-size: 16px; }
        .btn-add { background: var(--accent); color: black; border: none; padding: 12px; border-radius: 8px; font-weight: 700; cursor: pointer; width: 100%; }
        table { width: 100%; border-collapse: collapse; }
        td, th { padding: 12px; text-align: left; border-bottom: 1px solid #222; }
        #loading-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); display:none; justify-content:center; align-items:center; z-index:999; flex-direction: column; }
    </style>
</head>
<body>
    <div id="loading-overlay">⌛ Caricamento Cloud...</div>

    <div class="sidebar">
        <div style="font-size: 18px; font-weight: 700; color: var(--accent); margin-bottom: 30px;">ARCHIVIO CLOUD</div>
        <div onclick="showPage('dashboard')" style="cursor:pointer; margin-bottom:15px">🏠 Dashboard</div>
        <div onclick="showPage('lista')" style="cursor:pointer; margin-bottom:15px">📂 Registro</div>
    </div>

    <div class="main">
        <div id="page-dashboard" class="page active">
            <h1>Dashboard</h1>
            <div class="stats-grid">
                <div class="stat-card"><div>Totale</div><div id="st-tot" class="stat-val">0</div></div>
                <div class="stat-card" style="border-left-color: var(--green);"><div>In Sede</div><div id="st-sede" class="stat-val">0</div></div>
                <div class="stat-card" style="border-left-color: var(--red);"><div>Fuori</div><div id="st-fuori" class="stat-val">0</div></div>
                <div class="stat-card" style="border-left-color: #5a8fad;"><div>Gruppi</div><div id="st-gruppi" class="stat-val">0</div></div>
            </div>
            <div class="content-card"><h3>Database Cloud</h3><table id="full-lista-mini"></table></div>
        </div>

        <div id="page-lista" class="page" style="display:none">
            <div class="content-card">
                <input type="text" id="newNum" placeholder="Numero">
                <input type="text" id="newAnno" placeholder="Anno">
                <input type="text" id="newGruppo" placeholder="Ripiano">
                <button class="btn-add" onclick="azioneCloud('add')">Aggiungi Fascicolo</button>
                <hr style="margin:20px 0; opacity:0.1">
                <input type="text" id="search" placeholder="🔍 Cerca..." onkeyup="filter()">
                <div style="overflow-x: auto;"><table id="full-lista"></table></div>
            </div>
        </div>
    </div>

    <script>
        // URL TESTATO E FUNZIONANTE
        const API_URL = "https://script.google.com/macros/s/AKfycbyo9QEUQfs8GymqVVjwuDXfLi_LtTLq4xspMJ-HKfTvQCkrTumiT4mp5pb9mJ5KwzhvuQ/exec";
        let dbCache = [];

        async function caricaDati() {
            const loader = document.getElementById('loading-overlay');
            loader.style.display = 'flex';
            try {
                // Usiamo un metodo di fetch più robusto
                const response = await fetch(API_URL, { method: 'GET', mode: 'cors', redirect: 'follow' });
                if (!response.ok) throw new Error("Errore risposta");
                dbCache = await response.json();
                render();
            } catch (e) {
                console.error("Errore Fetch:", e);
                alert("Connessione Cloud non riuscita. Verifica che il Foglio Google abbia il tab denominato 'Dati'.");
            }
            loader.style.display = 'none';
        }

        async function azioneCloud(tipo, extra = {}) {
            document.getElementById('loading-overlay').style.display = 'flex';
            const payload = {
                action: tipo,
                Numero: extra.Numero || document.getElementById('newNum').value,
                Anno: extra.Anno || document.getElementById('newAnno').value,
                Gruppo: extra.Gruppo || document.getElementById('newGruppo').value,
                Stato: extra.Stato || "In sede",
                Note: extra.Note || ""
            };
            try {
                await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload), mode: 'no-cors' });
                // Dopo un POST no-cors aspettiamo un secondo e ricarichiamo
                setTimeout(caricaDati, 1500);
            } catch(e) { alert("Errore invio"); }
        }

        function render() {
            // Se non ci sono dati, svuota la tabella e esci
            if (!dbCache || dbCache.length === 0) {
                document.getElementById('full-lista').innerHTML = "<tr><td colspan='3'>Nessun dato trovato</td></tr>";
                return;
            }

            document.getElementById('st-tot').innerText = dbCache.length;
            document.getElementById('st-sede').innerText = dbCache.filter(x => x.Stato !== 'Prelevato').length;
            document.getElementById('st-fuori').innerText = dbCache.filter(x => x.Stato === 'Prelevato').length;
            document.getElementById('st-gruppi').innerText = [...new Set(dbCache.map(x => x.Gruppo))].filter(x => x).length;

            const rows = dbCache.map((f, i) => {
                // Protezione contro i nomi colonne sbagliati
                const n = f.Numero || f.numero || f.N || "-";
                const a = f.Anno || f.anno || f.A || "-";
                const g = f.Gruppo || f.gruppo || f.Ripiano || "-";
                const s = f.Stato || f.stato || "In sede";

                return `
                <tr>
                    <td><b>${n}/${a}</b><br><small>${g}</small></td>
                    <td><span style="color:${s ==='Prelevato'?'#ff6b6b':'#5aad7a'}">${s}</span></td>
                    <td><button class="btn-add" style="padding:5px 10px; width:auto" onclick="gestisci(${i})">🤝</button></td>
                </tr>`;
            }).join('');
            
            document.getElementById('full-lista').innerHTML = rows;
            if(document.g

        function gestisci(i) {
            const f = dbCache[i];
            if (f.Stato !== "Prelevato") {
                const d = prompt("Chi preleva?");
                if(d) azioneCloud('update', {...f, Stato:"Prelevato", Note:"Preso da "+d});
            } else {
                if(confirm("Rientro?")) azioneCloud('update', {...f, Stato:"In sede", Note:""});
            }
        }

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            document.getElementById('page-' + id).style.display = 'block';
        }

        function filter() {
            const v = document.getElementById('search').value.toLowerCase();
            document.querySelectorAll('#full-lista tr').forEach(r => r.style.display = r.innerText.toLowerCase().includes(v) ? '' : 'none');
        }

        window.onload = caricaDati;
    </script>
</body>
</html>
