<!DOCTYPE html>

<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Archivio Fascicoli</title>
<script src=""></script>
<link href="" rel="stylesheet">
<style>
:root { --bg:#0f0f0f; --surface:#1a1a1a; --border:#2e2e2e; --accent:#e8c97a; --text:#f0ece0; }
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); margin:0; display:flex; min-height:100vh; }
.sidebar { width:250px; background:var(--surface); border-right:1px solid var(--border); padding:20px; }
.main { flex:1; padding:30px; }
.card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:20px; margin-bottom:20px; }
.nav-item { padding:12px; border-radius:8px; cursor:pointer; color:#a09880; margin-bottom:5px; }
.nav-item:hover { background:rgba(232,201,122,0.1); color:var(--accent); }
.dropzone { border:2px dashed var(--border); border-radius:12px; padding:40px; text-align:center; cursor:pointer; }
table { width:100%; border-collapse:collapse; }
th { text-align:left; color:#6a6258; font-size:11px; text-transform:uppercase; padding:10px; border-bottom:1px solid var(--border); }
td { padding:12px 10px; border-bottom:1px solid var(--border); font-size:13px; }
</style>
</head>
<body>
<div class="sidebar">
<h1 style="font-family:'DM Serif Display'; color:var(--accent);">Archivio</h1>
<div onclick="location.reload()" class="nav-item">Dashboard</div>
<div onclick="document.getElementById('import-sect').scrollIntoView()" class="nav-item">Importa Excel</div>
</div>
<div class="main">
<div class="card">
<h2>Lista Fascicoli</h2>
<table>
<thead><tr><th>N° / Anno</th><th>Oggetto</th><th>Parti</th></tr></thead>
<tbody id="tabella"></tbody>
</table>
</div>
<div id="import-sect" class="card">
<h2>Carica Excel</h2>
<div class="dropzone" onclick="document.getElementById('fileIn').click()">
Clicca qui per caricare il file .xlsx
<input type="file" id="fileIn" style="display:none" accept=".xlsx">
</div>
</div>
</div>
<script>
document.getElementById('fileIn').addEventListener('change', function(e) {
const reader = new FileReader();
reader.onload = function(event) {
const data = new Uint8Array(event.target.result);
const wb = XLSX.read(data, {type: 'array'});
const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
localStorage.setItem('dati', JSON.stringify(json));
alert('Caricati ' + json.length + ' elementi');
render();
};
reader.readAsArrayBuffer(e.target.files[0]);
});
function render() {
const dati = JSON.parse(localStorage.getItem('dati') || '[]');
document.getElementById('tabella').innerHTML = dati.map(f =>
&lt;tr&gt;&lt;td&gt;${f.Numero || &#39;&#39;}/${f.Anno || &#39;&#39;}&lt;/td&gt;&lt;td&gt;${f.Oggetto || &#39;&#39;}&lt;/td&gt;&lt;td&gt;${f.Parte1 || &#39;&#39;}&lt;/td&gt;&lt;/tr&gt;
).join('');
}
render();
</script>
</body>
</html>
