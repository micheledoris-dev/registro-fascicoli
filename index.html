<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archivio Pro v7.6 - Stampa A4</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { background-color: #F0F2F5; font-family: sans-serif; }
        .stat-card { background: white; border-radius: 20px; padding: 20px; border-bottom: 4px solid #3B82F6; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        #modal.active { display: flex; }
        #reader-container { display: none; max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 20px; }

        /* Stili per la stampa A4 */
        @media print {
            body * { visibility: hidden; }
            #print-zone, #print-zone * { visibility: visible; }
            #print-zone {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                height: 100%;
                display: flex !important;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                text-align: center;
                background: white;
            }
            .no-print { display: none !important; }
        }
        #print-zone { display: none; }
    </style>
</head>
<body class="p-4 lg:p-10">

<div id="print-zone">
    <div id="print-content" class="w-full">
        <h1 id="p-ripiano" class="text-[80px] font-black leading-tight uppercase mb-4 text-gray-900"></h1>
        <div id="p-gruppo" class="text-[120px] font-black border-t-8 border-black pt-8 uppercase text-blue-800"></div>
        <p class="text-2xl mt-20 text-gray-400">Archivio Fascicoli - Documentazione Logistica</p>
    </div>
</div>

<div class="max-w-7xl mx-auto no-print">
    <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
        <h1 class="text-3xl font-black text-gray-800">📁 Archivio Pro</h1>
        <div class="flex flex-wrap gap-2 justify-center">
            <button onclick="startScanner()" class="bg-indigo-600 text-white px-5 py-2 rounded-xl font-bold shadow-lg">📸 SCANNER</button>
            <button onclick="document.getElementById('file-in').click()" class="bg-white border px-4 py-2 rounded-xl font-semibold">Importa</button>
            <button onclick="exportExcel()" class="bg-white border px-4 py-2 rounded-xl font-semibold">Esporta</button>
            <button onclick="openModal()" class="bg-blue-600 text-white px-8 py-2 rounded-xl font-bold shadow-blue-200 shadow-xl">＋ NUOVO</button>
        </div>
    </header>

    <div id="reader-container" class="mb-10 shadow-2xl">
        <div class="flex justify-between mb-4"><h3 class="font-bold">Scannerizza</h3><button onclick="stopScanner()" class="text-red-500 font-bold">CHIUDI</button></div>
        <div id="reader"></div>
    </div>

    <div class="grid grid-cols-2 lg:grid-cols-4 gap-6 mb-10">
        <div class="stat-card"><p class="text-[10px] font-bold text-gray-400 uppercase">Totali</p><h3 id="stat-total" class="text-3xl font-black">0</h3></div>
        <div class="stat-card !border-orange-500"><p class="text-[10px] font-bold text-gray-400 uppercase">Prelevati</p><h3 id="stat-out" class="text-3xl font-black">0</h3></div>
        <div class="stat-card !border-green-500"><p class="text-[10px] font-bold text-gray-400 uppercase">In Archivio</p><h3 id="stat-in" class="text-3xl font-black">0</h3></div>
        <div class="stat-card !border-purple-500"><p class="text-[10px] font-bold text-gray-400 uppercase">Gruppi Unici</p><h3 id="stat-groups" class="text-3xl font-black">0</h3></div>
    </div>

    <div class="bg-white p-4 rounded-2xl mb-8 shadow-sm flex items-center gap-4">
        <span class="text-xl">🔍</span>
        <input type="text" id="search" placeholder="Cerca..." onkeyup="filter()" class="w-full outline-none text-lg">
    </div>

    <div class="bg-white rounded-[30px] shadow-xl overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-left text-sm">
                <thead class="bg-gray-50 border-b text-gray-400 font-bold text-[10px] uppercase">
                    <tr>
                        <th class="p-6">Fascicolo</th>
                        <th class="p-6">Registro</th>
                        <th class="p-6">Posizione</th>
                        <th class="p-6">Stato</th>
                        <th class="p-6 text-right">Azioni</th>
                    </tr>
                </thead>
                <tbody id="table-body" class="divide-y divide-gray-50 bg-white"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="modal">
    <div class="bg-white p-8 rounded-[40px] w-full max-w-xl mx-4 shadow-2xl">
        <h2 class="text-2xl font-black mb-6">Gestione Fascicolo</h2>
        <div class="grid grid-cols-2 gap-4">
            <input type="text" id="m-num" placeholder="Numero" class="p-4 bg-gray-50 rounded-2xl outline-none">
            <input type="text" id="m-anno" placeholder="Anno" class="p-4 bg-gray-50 rounded-2xl outline-none">
            <input type="text" id="m-reg" placeholder="Registro" class="p-4 bg-gray-50 rounded-2xl outline-none">
            <input type="text" id="m-data" readonly class="p-4 bg-gray-100 rounded-2xl text-gray-400">
            <input type="text" id="m-ripiano" placeholder="Ripiano" class="p-4 bg-gray-50 rounded-2xl outline-none ring-1 ring-blue-100">
            <input type="text" id="m-gruppo" placeholder="Gruppo" class="p-4 bg-gray-50 rounded-2xl outline-none ring-1 ring-blue-100">
            <select id="m-stato" class="p-4 bg-gray-50 rounded-2xl outline-none col-span-2">
                <option value="In archivio">In archivio</option>
                <option value="Prelevato">Prelevato</option>
            </select>
        </div>
        <div class="flex justify-end gap-4 mt-10">
            <button onclick="closeModal()" class="font-bold text-gray-400">Annulla</button>
            <button onclick="save()" class="bg-blue-600 text-white px-10 py-3 rounded-2xl font-bold">SALVA</button>
        </div>
    </div>
</div>

<input type="file" id="file-in" class="hidden" onchange="importXLS(event)">
