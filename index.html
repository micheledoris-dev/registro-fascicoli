<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Archivio Smart Pro</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0b0b; --card-bg: #161616; --accent: #e8c97a; --text-main: #f0ece0; --text-dim: #a09880; --border: #262626; --red: #e05555; --green: #5aad7a; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text-main); min-height: 100vh; overflow-x: hidden; }
        .sidebar { width: 260px; background: #111; border-right: 1px solid var(--border); padding: 24px; position: fixed; height: 100vh; z-index: 100; }
        .main { margin-left: 260px; padding: 20px; width: calc(100% - 260px); }
        @media (max-width: 900px) { .sidebar { display: none; } .main { margin-left: 0; width: 100%; padding: 15px; } .stats-grid { grid-template-columns: 1fr 1fr !important; } }
        .nav-item { padding: 12px 15px; border-radius: 8px; cursor: pointer; color: var(--text-dim); margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
        .nav-item.active { background: rgba(232,201,122,0.1); color: var(--accent); }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: var(--card-bg); padding: 15px; border-radius: 12px; border: 1px solid var(--border); border-left: 4px solid var(--accent); }
        .stat-val { font-size: 24px; font-weight: 700; color: white; }
        .content-card { background: var(--card-bg); border-radius: 12px; border: 1px solid var(--border); padding: 15px; margin-bottom: 20px; }
        input { background: #0b0b0b; border: 1px solid var(--border); padding: 12px; border-radius: 8px; color: white; width: 100%; margin-bottom: 10px; font-size: 16px; }
        .btn-add { background: var(--accent); color: black; border: none; padding: 14px; border-radius: 8px; font-weight: 700; cursor: pointer; width: 100%; }
        table { width: 100%; border-collapse: collapse; }
        td, th { padding: 12px; text-align: left; border-bottom: 1px solid #222; }
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: bold; }
        .badge-fuori { background: rgba(224,85,85,0.2); color: #ff6b6b; }
        .badge-sede { background: rgba(90,173,122,0.1); color: var(--green); }
        #print-area { display: none; text-align: center; color: black; background: white; padding: 50px; }
        @media print { body * { visibility: hidden; } #print-area, #print-area * { visibility: visible; } #print-area { display: block !important; position: absolute; left: 0; top: 0; width: 100%; } }
    </style>
</head>
<body>
    <div class="sidebar">
        <div style="font-size: 18px; font-weight: 700; color: var(--accent); margin-bottom: 30px;">ARCHIVIO PRO</div>
        <div class="nav-item active" id="n-dash" onclick="showPage('dashboard')">🏠 Dashboard</div>
        <div class="nav-item" id="n-list" onclick="showPage('lista')">📂 Registro</div>
        <div class="nav-item" id="n-qr" onclick="showPage('qr-sect')">🖨️ Etichette</div>
    </div>

    <div class="main">
        <div id="page-dashboard" class="page active">
            <h1>Stato Archivio</h1>
            <div class="stats-grid">
                <div class="stat-card"><div>Totale</div><div id="st-tot" class="stat-val">0</div></div>
                <div class="stat-card" style="border-left-color: var(--green);"><div>In Sede</div><div id="st-sede" class="stat-val">0</div></div>
                <div class="stat-card" style="border-left-color: var(--red);"><div>Fuori</div><div id="st-fuori" class="stat-val">0</div></div>
                <div class="stat-card" style="border-left-color: #5a8fad;"><div>Gruppi</div><div id="st-gruppi" class="stat-val">0</div></div>
            </div>
            <div class="content-card"><h3>Ultimi Movimenti</h3><table id="mini-table"></table></div>
        </div>

        <div id="page-lista" class="page" style="display:none">
            <div class="content-card">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <input type="text" id="in-num" placeholder="Numero">
                    <input type="text" id="in-anno" placeholder="Anno">
                </div>
                <input type="text" id="in-rip" placeholder="Ripiano / Gruppo">
                <button class="btn-add" onclick="aggiungi()">AGGIUNGI FASCICOLO</button>
            </div>
            <div class="content-card">
                <input type="text" id="search" placeholder="🔍 Cerca..." onkeyup="filtra()">
                <div style="overflow-x: auto;"><table id="main-table"></table></div>
            </div>
        </div>

        <div id="page-qr-sect" class="page" style="display:none">
            <h1>Stampa Etichette QR</h1>
            <div id="lista-qr-gruppi"></div>
        </div>
    </div>

    <div id="print-area"><h1 id="p-title" style="font-size: 32px;"></h1><div id="qrcode" style="display:flex; justify-content:center; margin:30px"></div><p>Scansiona per consultare questo ripiano</p></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC4PA_joHtGFRudPUYBOQAMrOgVearBt3I",
            authDomain: "archivio-sentenze.firebaseapp.com",
            databaseURL: "https://archivio-sentenze-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "archivio-sentenze",
            storageBucket: "archivio-sentenze.appspot.com",
            messagingSenderId: "139447095387",
            appId: "1:139447095387:web:32d031468fa4c74a83af7e",
            measurementId: "G-9NMKDSJ6JB"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('fascicoli');

        db.on('value', (snapshot) => {
            const data = snapshot.val();
            const lista = data ? Object.keys(data).map(key => ({id: key, ...data[key]})) : [];
            render(lista);
        });

        function aggiungi() {
            const n = document.getElementById('in-num').value, a = document.getElementById('in-anno').value, r = document.getElementById('in-rip').value;
            if(!n || !a) return alert("Inserisci Numero e Anno");
            db.push({ numero: n, anno: a, gruppo: r || "Generale", stato: "In sede", data: new Date().toISOString() });
            document.getElementById('in-num').value = ""; document.getElementById('in-anno').value = "";
        }

        function toggleStato(id, attuale) {
            const nuovo = attuale === "In sede" ? "Prelevato" : "In sede";
            let nota = nuovo === "Prelevato" ? prompt("Chi preleva il fascicolo?") : "";
            if(nuovo === "Prelevato" && !nota) return;
            db.child(id).update({ stato: nuovo, nota: nota || "" });
        }

        function render(lista) {
            document.getElementById('st-tot').innerText = lista.length;
            document.getElementById('st-sede').innerText = lista.filter(x => x.stato === 'In sede').length;
            document.getElementById('st-fuori').innerText = lista.filter(x => x.stato === 'Prelevato').length;
            const gruppi = [...new Set(lista.map(x => x.gruppo))];
            document.getElementById('st-gruppi').innerText = gruppi.length;

            const html = lista.reverse().map(f => `
                <tr>
                    <td><b>${f.numero}/${f.anno}</b><br><small>${f.gruppo} ${f.nota?'- '+f.nota:''}</small></td>
                    <td><span class="badge ${f.stato==='Prelevato'?'badge-fuori':'badge-sede'}">${f.stato}</span></td>
                    <td onclick="toggleStato('${f.id}', '${f.stato}')" style="cursor:pointer; font-size:20px">🤝</td>
                </tr>`).join('');
            document.getElementById('main-table').innerHTML = html;
            document.getElementById('mini-table').innerHTML = html.slice(0, 5);

            document.getElementById('lista-qr-gruppi').innerHTML = gruppi.map(g => `
                <div class="content-card" style="display:flex; justify-content:space-between; align-items:center">
                    <b>${g}</b><button onclick="stampa('${g}')" class="btn-add" style="width:auto; padding:8px 15px">STAMPA</button>
                </div>`).join('');
        }

        function stampa(g) {
            document.getElementById('p-title').innerText = g;
            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById("qrcode"), { text: window.location.href.split('?')[0] + "?cerca=" + encodeURIComponent(g), width: 250, height: 250 });
            setTimeout(() => { window.print(); }, 800);
        }

        function showPage(p) {
            document.querySelectorAll('.page').forEach(page => page.style.display = 'none');
            document.getElementById('page-' + p).style.display = 'block';
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            const map = {'dashboard':'n-dash', 'lista':'n-list', 'qr-sect':'n-qr'};
            document.getElementById(map[p]).classList.add('active');
        }

        function filtra() {
            const val = document.getElementById('search').value.toLowerCase();
            document.querySelectorAll('#main-table tr').forEach(tr => { tr.style.display = tr.innerText.toLowerCase().includes(val) ? '' : 'none'; });
        }

        // Auto-filtro se arrivo da QR
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            if(params.has('cerca')) { showPage('lista'); document.getElementById('search').value = params.get('cerca'); filtra(); }
        }
    </script>
</body>
</html>
