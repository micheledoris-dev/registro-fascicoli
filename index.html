<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archivio Sentenze v4 (Maschera Pulita)</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.1/qrcode.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { background-color: #F2F2F7; font-family: sans-serif; }
        .apple-card { background: rgba(255,255,255,0.9); border-radius: 18px; border: 1px solid rgba(0,0,0,0.05); }
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 9999; align-items: center; justify-content: center; }
        #modal.active { display: flex; }
        @media print { .no-print { display: none !important; } #print-area { display: block !important; } }
        #print-area { display: none; text-align: center; padding: 40px; }
    </style>
</head>
<body class="p-4 md:p-8">

<div class="max-w-6xl mx-auto no-print">
    <header class="flex flex-wrap justify-between items-center mb-8 gap-4">
        <div class="flex items-center gap-3">
            <span class="text-3xl">📁</span>
            <h1 class="text-2xl font-bold tracking-tight text-gray-800">Archivio Sentenze Cloud</h1>
        </div>
        <div class="flex gap-2">
            <button onclick="document.getElementById('file-in').click()" class="bg-white border px-4 py-2 rounded-xl text-sm font-semibold shadow-sm hover:bg-gray-50 transition">Importa</button>
            <button onclick="exportExcel()" class="bg-white border px-4 py-2 rounded-xl text-sm font-semibold shadow-sm hover:bg-gray-50 transition">Esporta</button>
            <button onclick="openModal()" class="bg-blue-600 text-white px-6 py-2 rounded-xl text-sm font-bold shadow-lg hover:bg-blue-700 transition">＋ NUOVO</button>
        </div>
    </header>

    <div class="apple-card p-4 mb-6 shadow-sm ring-1 ring-black/5">
        <input type="text" id="search" placeholder="Cerca numero, anno o posizione..." onkeyup="filter()" class="w-full bg-transparent outline-none text-lg">
    </div>

    <div class="apple-card overflow-hidden border border-gray-100 shadow-xl">
        <table class="w-full text-left">
            <thead class="bg-gray-50 border-b border-gray-100">
                <tr class="text-xs font-bold text-gray-400 uppercase tracking-widest">
                    <th class="p-4">Fascicolo</th>
                    <th class="p-4">Registro</th>
                    <th class="p-4">Posizione (Ripiano + Gruppo)</th>
                    <th class="p-4">Stato</th>
                    <th class="p-4 text-right">Azioni</th>
                </tr>
            </thead>
            <tbody id="table-body" class="divide-y divide-gray-50 bg-white">
                <tr><td colspan="5" class="p-10 text-center text-gray-400 italic loading">Sincronizzazione in corso...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<div id="modal">
    <div class="bg-white p-8 rounded-[25px] w-full max-w-md mx-4 shadow-2xl">
        <h2 id="modal-title" class="text-2xl font-bold mb-6">Dettagli Fascicolo</h2>
        <div class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <input type="text" id="m-num" placeholder="Numero" class="p-3 bg-gray-50 rounded-xl border-none ring-1 ring-gray-200 focus:ring-2 focus:ring-blue-500 outline-none">
                <input type="text" id="m-anno" placeholder="Anno" class="p-3 bg-gray-50 rounded-xl border-none ring-1 ring-gray-200 focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <input type="text" id="m-reg" placeholder="Registro" class="w-full p-3 bg-gray-50 rounded-xl border-none ring-1 ring-gray-200 outline-none">
            <input type="text" id="m-gruppo" placeholder="Posizione (Ripiano + Gruppo)" class="w-full p-3 bg-gray-50 rounded-xl border-none ring-1 ring-gray-200 outline-none">
            <input type="text" id="m-stato" placeholder="Stato" class="w-full p-3 bg-gray-50 rounded-xl border-none ring-1 ring-gray-200 outline-none">
        </div>
        <div class="flex justify-end gap-3 mt-8">
            <button onclick="closeModal()" class="px-5 py-2 text-sm font-bold text-gray-400">Annulla</button>
            <button onclick="save()" class="bg-blue-600 text-white px-8 py-2 rounded-xl text-sm font-bold shadow-lg">SALVA</button>
        </div>
    </div>
</div>

<div id="print-area">
    <h1 id="p-label" style="font-size: 35px; font-weight: bold; margin-bottom: 20px;"></h1>
    <div id="p-qr" style="display: flex; justify-content: center;"></div>
</div>

<input type="file" id="file-in" class="hidden" onchange="importXLS(event)">

<script>
    // --- TUA CONFIGURAZIONE FIREBASE ---
    const firebaseConfig = {
      apiKey: "AIzaSyC4PA_joHtGFRudPUYBOQAMrOgVearBt3I",
      authDomain: "archivio-sentenze.firebaseapp.com",
      databaseURL: "https://archivio-sentenze-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "archivio-sentenze",
      storageBucket: "archivio-sentenze.firebasestorage.app",
      messagingSenderId: "139447095387",
      appId: "1:139447095387:web:32d031468fa4c74a83af7e"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('sentenze');
    let fullData = [];
    let editingKey = null;

    db.on('value', (snap) => {
        const val = snap.val();
        fullData = val ? Object.keys(val).map(k => ({...val[k], fbKey: k})) : [];
        renderTable();
    });

    function renderTable() {
        const body = document.getElementById('table-body');
        if (fullData.length === 0) {
            body.innerHTML = '<tr><td colspan="5" class="p-10 text-center text-gray-300 italic">Database vuoto. Importa un file Excel.</td></tr>';
            return;
        }
        body.innerHTML = fullData.map(i => `
            <tr class="hover:bg-blue-50/30 transition border-b border-gray-50last:border-0">
                <td class="p-4 font-bold text-blue-600">${i.num || '-'} / ${i.anno || '-'}</td>
                <td class="p-4 text-gray-500 font-medium">${i.reg || '-'}</td>
                <td class="p-4 font-semibold text-gray-700">${i.gruppo || '-'}</td>
                <td class="p-4">
                    <span class="px-2 py-1 ${i.stato === 'In archivio' ? 'bg-green-100 text-green-700' : 'bg-blue-100 text-blue-700'} rounded-lg text-[10px] font-black uppercase tracking-wider">
                        ${i.stato || 'In archivio'}
                    </span>
                </td>
                <td class="p-4 text-right space-x-1">
                    <button onclick="doPrint('${i.gruppo}')" class="text-[10px] font-bold bg-gray-100 px-3 py-1.5 rounded-lg hover:bg-black hover:text-white transition uppercase">QR</button>
                    <button onclick="openModal('${i.fbKey}')" class="p-2 text-gray-300 hover:text-blue-600 transition">✏️</button>
                    <button onclick="del('${i.fbKey}')" class="p-2 text-gray-300 hover:text-red-600 transition">🗑️</button>
                </td>
            </tr>
        `).join('');
    }

    // --- IMPORTAZIONE AGGIORNATA PER LA NUOVA MASCHERA ---
    function importXLS(e) {
        const reader = new FileReader();
        reader.onload = (evt) => {
            const data = new Uint8Array(evt.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const worksheet = workbook.Sheets[workbook.SheetNames[0]];
            // Usiamo {header: 1} per leggere per posizione A, B, C...
            const rows = XLSX.utils.sheet_to_json(worksheet, {header: 1}); 
            
            const dataRows = rows.slice(1); // Salta i titoli

            if (confirm("Caricare " + dataRows.length + " righe?")) {
                dataRows.forEach(row => {
                    // Mappatura forzata basata sulla tua foto
                    const num = row[0] || ""; // Colonna A
                    const anno = row[1] || ""; // Colonna B
                    const reg = row[2] || "-"; // Colonna C
                    
                    // UNISCE Ripiano (D) e Gruppo (E) in un'unica posizione nell'app
                    let ripianoParte = row[3] ? String(row[3]).trim() : "";
                    let gruppoParte = row[4] ? String(row[4]).trim() : "";
                    let posizioneCompleta = (ripianoParte + " " + gruppoParte).trim() || "-";

                    // Prende lo Stato esatto (Colonna F)
                    let stato = row[5] ? String(row[5]).trim() : "In archivio";

                    if(num) {
                        db.push({ 
                            num: num, 
                            anno: anno, 
                            reg: reg, 
                            gruppo: posizioneCompleta, 
                            stato: stato 
                        });
                    }
                });
            }
        };
        reader.readAsArrayBuffer(e.target.files[0]);
    }

    // --- FUNZIONI STANDARD (Modal, Save, Del, Filter, Export, QR) ---
    function openModal(key = null) {
        editingKey = key;
        document.getElementById('modal-title').innerText = key ? "Modifica Fascicolo" : "Nuovo Fascicolo";
        if (key) {
            const item = fullData.find(x => x.fbKey === key);
            document.getElementById('m-num').value = item.num;
            document.getElementById('m-anno').value = item.anno;
            document.getElementById('m-reg').value = item.reg;
            document.getElementById('m-gruppo').value = item.gruppo;
            document.getElementById('m-stato').value = item.stato;
        } else {
            document.querySelectorAll('#modal input').forEach(input => input.value = "");
            document.getElementById('m-stato').value = "In archivio";
        }
        document.getElementById('modal').classList.add('active');
    }

    function closeModal() { document.getElementById('modal').classList.remove('active'); }

    function save() {
        const payload = {
            num: document.getElementById('m-num').value,
            anno: document.getElementById('m-anno').value,
            reg: document.getElementById('m-reg').value,
            gruppo: document.getElementById('m-gruppo').value,
            stato: document.getElementById('m-stato').value
        };
        if (!payload.num) return alert("Numero obbligatorio!");
        if (editingKey) db.child(editingKey).set(payload);
        else db.push(payload);
        closeModal();
    }

    function del(key
