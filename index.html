<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archivio Pro v7.3</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.1/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { background-color: #F0F2F5; font-family: sans-serif; }
        .stat-card { background: white; border-radius: 20px; padding: 20px; border-bottom: 4px solid #3B82F6; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        #modal.active { display: flex; }
        #reader-container { display: none; max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 20px; }
    </style>
</head>
<body class="p-4 lg:p-10">

<div class="max-w-7xl mx-auto">
    <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
        <h1 class="text-3xl font-black text-gray-800">📁 Archivio Pro</h1>
        <div class="flex flex-wrap gap-2 justify-center">
            <button onclick="startScanner()" class="bg-indigo-600 text-white px-5 py-2 rounded-xl font-bold shadow-lg">📸 SCANNER</button>
            <button onclick="document.getElementById('file-in').click()" class="bg-white border px-4 py-2 rounded-xl font-semibold">Importa</button>
            <button onclick="exportExcel()" class="bg-white border px-4 py-2 rounded-xl font-semibold">Esporta</button>
            <button onclick="openModal()" class="bg-blue-600 text-white px-8 py-2 rounded-xl font-bold shadow-blue-200 shadow-xl hover:scale-105 transition">＋ NUOVO</button>
        </div>
    </header>

    <div id="reader-container" class="mb-10 shadow-2xl">
        <div class="flex justify-between mb-4">
            <h3 class="font-bold">Scannerizza QR</h3>
            <button onclick="stopScanner()" class="text-red-500 font-bold">CHIUDI</button>
        </div>
        <div id="reader"></div>
    </div>

    <div class="grid grid-cols-2 lg:grid-cols-4 gap-6 mb-10">
        <div class="stat-card">
            <p class="text-[10px] font-bold text-gray-400 uppercase">Totali</p>
            <h3 id="stat-total" class="text-3xl font-black">0</h3>
        </div>
        <div class="stat-card !border-orange-500">
            <p class="text-[10px] font-bold text-gray-400 uppercase">Prelevati</p>
            <h3 id="stat-out" class="text-3xl font-black">0</h3>
        </div>
        <div class="stat-card !border-green-500">
            <p class="text-[10px] font-bold text-gray-400 uppercase">In Archivio</p>
            <h3 id="stat-in" class="text-3xl font-black">0</h3>
        </div>
        <div class="stat-card !border-purple-500">
            <p class="text-[10px] font-bold text-gray-400 uppercase">Gruppi</p>
            <h3 id="stat-groups" class="text-3xl font-black">0</h3>
        </div>
    </div>

    <div class="bg-white p-4 rounded-2xl mb-8 shadow-sm flex items-center gap-4">
        <span class="text-xl">🔍</span>
        <input type="text" id="search" placeholder="Cerca qualsiasi dato..." onkeyup="filter()" class="w-full outline-none text-lg">
    </div>

    <div class="bg-white rounded-[30px] shadow-xl overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-left text-sm">
                <thead class="bg-gray-50 border-b text-gray-400 font-bold text-[10px] uppercase">
                    <tr>
                        <th class="p-6">Fascicolo</th>
                        <th class="p-6">Registro</th>
                        <th class="p-6">Posizione</th>
                        <th class="p-6">Stato</th>
                        <th class="p-6">Prelevatore</th>
                        <th class="p-6">Ultima Modifica</th>
                        <th class="p-6 text-right">Azioni</th>
                    </tr>
                </thead>
                <tbody id="table-body" class="divide-y divide-gray-50 bg-white">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<div id="modal">
    <div class="bg-white p-8 rounded-[40px] w-full max-w-xl mx-4 shadow-2xl">
        <h2 class="text-2xl font-black mb-6">Dettagli Fascicolo</h2>
        <div class="grid grid-cols-2 gap-4">
            <input type="text" id="m-num" placeholder="Numero" class="p-4 bg-gray-50 rounded-2xl outline-none ring-1 ring-gray-100">
            <input type="text" id="m-anno" placeholder="Anno" class="p-4 bg-gray-50 rounded-2xl outline-none ring-1 ring-gray-100">
            <input type="text" id="m-reg" placeholder="Registro" class="p-4 bg-gray-50 rounded-2xl outline-none ring-1 ring-gray-100">
            <input type="text" id="m-data" readonly class="p-4 bg-gray-100 rounded-2xl text-gray-400 border-none outline-none">
            
            <input list="list-ripiani" id="m-ripiano" placeholder="Ripiano" class="p-4 bg-gray-50 rounded-2xl outline-none ring-1 ring-gray-100">
            <datalist id="list-ripiani"></datalist>

            <input list="list-gruppi" id="m-gruppo" placeholder="Gruppo" class="p-4 bg-gray-50 rounded-2xl outline-none ring-1 ring-gray-100">
            <datalist id="list-gruppi"></datalist>

            <select id="m-stato" onchange="togglePrelevatore()" class="p-4 bg-gray-50 rounded-2xl outline-none ring-1 ring-gray-100">
                <option value="In archivio">📦 In archivio</option>
                <option value="Prelevato">🏃 Prelevato</option>
            </select>
            <input type="text" id="m-prelevatore" placeholder="Chi ha prelevato?" class="p-4 bg-orange-50 rounded-2xl outline-none ring-1 ring-orange-200 hidden">
        </div>
        <div class="flex justify-end gap-4 mt-10">
            <button onclick="closeModal()" class="font-bold text-gray-400">Annulla</button>
            <button onclick="save()" class="bg-blue-600 text-white px-10 py-3 rounded-2xl font-bold">SALVA</button>
        </div>
    </div>
</div>

<input type="file" id="file-in" class="hidden" onchange="importXLS(event)">

<script>
    // Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyC4PA_joHtGFRudPUYBOQAMrOgVearBt3I",
      authDomain: "archivio-sentenze.firebaseapp.com",
      databaseURL: "https://archivio-sentenze-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "archivio-sentenze",
      storageBucket: "archivio-sentenze.firebasestorage.app",
      messagingSenderId: "139447095387",
      appId: "1:139447095387:web:32d031468fa4c74a83af7e"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('sentenze');
    let fullData = [];
    let editingKey = null;
    let scanner = null;

    // Sincronizzazione Realtime
    db.on('value', (snap) => {
        const val = snap.val();
        fullData = val ? Object.keys(val).map(k => ({...val[k], fbKey: k})) : [];
        fullData.sort((a, b) => new Date(b.dataRaw || 0) - new Date(a.dataRaw || 0));
        renderTable();
        updateStats();
        updateDatalists();
    });

    function renderTable() {
        const body = document.getElementById('table-body');
        body.innerHTML = fullData.map(i => `
            <tr class="hover:bg-blue-50/30 transition">
                <td class="p-6 font-bold text-blue-600">${i.num || ''} / ${i.anno || ''}</td>
                <td class="p-6 text-gray-600">${i.reg || ''}</td>
                <td class="p-6"><b>${i.ripiano || ''}</b><br><span class="text-xs text-gray-400">${i.gruppo || ''}</span></td>
                <td class="p-6">
                    <span class="px-2 py-1 rounded-lg text-[10px] font-bold ${i.stato === 'Prelevato' ? 'bg-orange-100 text-orange-600' : 'bg-green-100 text-green-700'}">
                        ${(i.stato || 'In archivio').toUpperCase()}
                    </span>
                </td>
                <td class="p-6 font-bold text-gray-700">${i.prelevatore || '-'}</td>
                <td class="p-6 text-gray-400 text-xs">${i.data || ''}</td>
                <td class="p-6 text-right space-x-2">
                    <button onclick="openModal('${i.fbKey}')" class="text-gray-300 hover:text-blue-600 text-xl">✏️</button>
                    <button onclick="del('${i.fbKey}')" class="text-gray-300 hover:text-red-500 text-xl">🗑️</button>
                </td>
            </tr>
        `).join('');
    }

    function updateStats() {
        document.getElementById('stat-total').innerText = fullData.length;
        document.getElementById('stat-out').innerText = fullData.filter(x => x.stato === 'Prelevato').length;
        document.getElementById('stat-in').innerText = fullData.filter(x => x.stato !== 'Prelevato').length;
        document.getElementById('stat-groups').innerText = [...new Set(fullData.map(x => x.gruppo))].length;
    }

    function updateDatalists() {
        const ripiani = [...new Set(fullData.map(x => x.ripiano).filter(Boolean))];
        const gruppi = [...new Set(fullData.map(x => x.gruppo).filter(Boolean))];
        document.getElementById('list-ripiani').innerHTML = ripiani.map(r => `<option value="${r}">`).join('');
        document.getElementById('list-gruppi').innerHTML = gruppi.map(g => `<option value="${g}">`).join('');
    }

    function openModal(key = null) {
        editingKey = key;
        const now = new Date();
        const dataStr = now.toLocaleDateString() + ' ' + now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
        
        if (key) {
            const i = fullData.find(x => x.fbKey === key);
            document.getElementById('m-num').value = i.num || "";
            document.getElementById('m-anno').value = i.anno || "";
            document.getElementById('m-reg').value = i.reg || "";
            document.getElementById('m-ripiano').value = i.ripiano || "";
            document.getElementById('m-gruppo').value = i.gruppo || "";
            document.getElementById('m-stato').value = i.stato || "In archivio";
            document.getElementById('m-prelevatore').value = i.prelevatore || "";
            document.getElementById('m-data').value = i.data || dataStr;
        } else {
            document.querySelectorAll('#modal input:not([readonly])').forEach(el => el.value = "");
            document.getElementById('m-stato').value = "In archivio";
            document.getElementById('m-data').value = dataStr;
        }
        togglePrelevatore();
        document.getElementById('modal').classList.add('active');
    }

    function closeModal() { document.getElementById('modal').classList.remove('active'); }
    function togglePrelevatore() {
        const isOut = document.getElementById('m-stato').value === 'Prelevato';
        document.getElementById('m-prelevatore').classList.toggle('hidden', !isOut);
    }

    function save() {
        const payload = {
            num: document.getElementById('m-num').value,
            anno: document.getElementById('m-anno').value,
            reg: document.getElementById('m-reg').value,
            ripiano: document.getElementById('m-ripiano').value,
            gruppo: document.getElementById('m-gruppo').value,
            stato: document.getElementById('m-stato').value,
            prelevatore: (document.getElementById('m-stato').value === 'Prelevato') ? document.getElementById('m-prelevatore').value : "",
            data: document.getElementById('m-data').value,
            dataRaw: new Date().toISOString()
        };
        if (editingKey) db.child(editingKey).update(payload);
        else db.push(payload);
        closeModal();
    }

    function importXLS(e) {
        const reader = new FileReader();
        reader.onload = (evt) => {
            const data = new Uint8Array(evt.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header: 1});
            if (confirm("Importare " + (rows.length - 1) + " righe?")) {
                rows.slice(1).forEach(r => {
                    if(r[0]) db.push({
                        num: r[0] || "", anno: r[1] || "", reg: r[2] || "", 
                        ripiano: r[3] || "-", gruppo: r[4] || "-", 
                        stato: r[5] || "In archivio", 
                        data: r[6] || new Date().toLocaleDateString(),
                        dataRaw: new Date().toISOString()
                    });
                });
            }
        };
        reader.readAsArrayBuffer(e.target.files[0]);
    }

    function startScanner() {
        document.getElementById('reader-container').style.display = 'block';
        scanner = new Html5Qrcode("reader");
        scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (txt) => {
            document.getElementById('search').value = txt;
            filter();
            stopScanner();
        }).catch(err => console.error(err));
    }

    function stopScanner() {
        if(scanner) scanner.stop().then(() => document.getElementById('reader-container').style.display = 'none');
    }

    function exportExcel() {
        const ws = XLSX.utils.json_to_sheet(fullData.map(({fbKey, dataRaw, ...r}) => r));
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Archivio");
        XLSX.writeFile(wb, "archivio_pro.xlsx");
    }

    function del(k) { if(confirm("Eliminare?")) db.child(k).remove(); }
    function filter() {
        let v = document.getElementById('search').value.toLowerCase();
        document.querySelectorAll('#table-body tr').forEach(r => r.style.display = r.innerText.toLowerCase().includes(v) ? '' : 'none');
    }
</script>
</body>
</html>
