<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Archivio Smart Pro</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0b0b; --card-bg: #161616; --accent: #e8c97a; --text-main: #f0ece0; --text-dim: #a09880; --border: #262626; --red: #e05555; --green: #5aad7a; --input-bg: #222222; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text-main); min-height: 100vh; }
        .sidebar { width: 260px; background: #111; border-right: 1px solid var(--border); padding: 24px; position: fixed; height: 100vh; z-index: 100; }
        .main { margin-left: 260px; padding: 25px; width: calc(100% - 260px); }
        @media (max-width: 900px) { .sidebar { display: none; } .main { margin-left: 0; width: 100%; padding: 15px; } .stats-grid { grid-template-columns: 1fr 1fr !important; } }
        .nav-item { padding: 12px 15px; border-radius: 8px; cursor: pointer; color: var(--text-dim); margin-bottom: 8px; }
        .nav-item.active { background: rgba(232,201,122,0.1); color: var(--accent); font-weight: 600; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border); border-left: 4px solid var(--accent); }
        .stat-val { font-size: 28px; font-weight: 700; color: white; }
        .content-card { background: var(--card-bg); border-radius: 12px; border: 1px solid var(--border); padding: 20px; margin-bottom: 20px; }
        
        /* STILE CELLE INPUT MIGLIORATO */
        input { 
            background: var(--input-bg); 
            border: 1px solid #333; 
            padding: 14px; 
            border-radius: 8px; 
            color: white; 
            width: 100%; 
            margin-bottom: 12px; 
            font-size: 16px; 
            transition: 0.3s;
        }
        input::placeholder { color: #888; }
        input:focus { 
            border-color: var(--accent); 
            background: #2a2a2a;
            outline: none; 
            box-shadow: 0 0 8px rgba(232,201,122,0.2); 
        }
        
        .btn-add { background: var(--accent); color: black; border: none; padding: 15px; border-radius: 8px; font-weight: 700; cursor: pointer; width: 100%; text-transform: uppercase; }
        table { width: 100%; border-collapse: collapse; }
        td, th { padding: 15px 10px; border-bottom: 1px solid #1f1f1f; text-align: left; }
        .badge { padding: 5px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; }
        .badge-fuori { background: rgba(224,85,85,0.15); color: var(--red); }
        .badge-sede { background: rgba(90,173,122,0.15); color: var(--green); }
        .action-btn { background: none; border: none; cursor: pointer; font-size: 18px; padding: 5px; filter: grayscale(1); }
        .action-btn:hover { filter: grayscale(0); transform: scale(1.1); }
        #print-area { display: none; text-align: center; background: white; color: black; padding: 40px; }
        @media print { body * { visibility: hidden; } #print-area, #print-area * { visibility: visible; } #print-area { display: block !important; position: absolute; left: 0; top: 0; width: 100%; } }
    </style>
</head>
<body>
    <div class="sidebar">
        <div style="font-size: 20px; font-weight: 700; color: var(--accent); margin-bottom: 40px;">ARCHIVIO PRO</div>
        <div class="nav-item active" id="n-dash" onclick="showPage('dashboard')">🏠 Dashboard</div>
        <div class="nav-item" id="n-list" onclick="showPage('lista')">📂 Registro Fascicoli</div>
        <div class="nav-item" id="n-qr" onclick="showPage('qr-sect')">🖨️ Etichette QR</div>
    </div>
    <div class="main">
        <div id="page-dashboard" class="page active">
            <h1>Riepilogo Cloud</h1>
            <div class="stats-grid">
                <div class="stat-card"><div>Totali</div><div id="st-tot" class="stat-val">0</div></div>
                <div class="stat-card" style="border-left-color: var(--green);"><div>In Sede</div><div id="st-sede" class="stat-val">0</div></div>
                <div class="stat-card" style="border-left-color: var(--red);"><div>Fuori</div><div id="st-fuori" class="stat-val">0</div></div>
                <div class="stat-card" style="border-left-color: #5a8fad;"><div>Ripiani</div><div id="st-gruppi" class="stat-val">0</div></div>
            </div>
            <div class="content-card"><h3>Movimenti Recenti</h3><table id="mini-table"></table></div>
        </div>
        <div id="page-lista" class="page" style="display:none">
            <div class="content-card">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <input type="text" id="in-num" placeholder="Numero Fascicolo">
                    <input type="text" id="in-anno" placeholder="Anno">
                </div>
                <input type="text" id="in-rip" placeholder="Ripiano / Posizione">
                <button class="btn-add" id="main-btn" onclick="aggiungi()">Aggiungi al Cloud</button>
            </div>
            <div class="content-card">
                <input type="text" id="search" placeholder="🔍 Cerca fascicolo, ripiano o dottore...">
                <div style="overflow-x: auto;"><table><tbody id="main-table"></tbody></table></div>
            </div>
        </div>
        <div id="page-qr-sect" class="page" style="display:none">
            <h1>Etichette QR</h1>
            <div id="lista-qr-gruppi"></div>
        </div>
    </div>
    <div id="print-area"><h1 id="p-title"></h1><div id="qrcode" style="display:flex; justify-content:center; margin:30px"></div></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC4PA_joHtGFRudPUYBOQAMrOgVearBt3I",
            authDomain: "archivio-sentenze.firebaseapp.com",
            databaseURL: "https://archivio-sentenze-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "archivio-sentenze",
            storageBucket: "archivio-sentenze.appspot.com",
            messagingSenderId: "139447095387",
            appId: "1:139447095387:web:32d031468fa4c74a83af7e",
            measurementId: "G-9NMKDSJ6JB"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('fascicoli');
        let editingId = null;

        db.on('value', (snapshot) => {
            const data = snapshot.val();
            const lista = data ? Object.keys(data).map(key => ({id: key, ...data[key]})) : [];
            render(lista);
        });

        function aggiungi() {
            const n = document.getElementById('in-num').value, a = document.getElementById('in-anno').value, r = document.getElementById('in-rip').value;
            if(!n || !a) return alert("Dati obbligatori!");
            if(editingId) {
                db.child(editingId).update({ numero: n, anno: a, gruppo: r || "Generale" });
                editingId = null;
                document.getElementById('main-btn').innerText = "Aggiungi al Cloud";
            } else {
                db.push({ numero: n, anno: a, gruppo: r || "Generale", stato: "In sede", data: new Date().toISOString() });
            }
            document.getElementById('in-num').value = ""; document.getElementById('in-anno').value = ""; document.getElementById('in-rip').value = "";
        }

        function preparaModifica(id, n, a, r) {
            editingId = id;
            document.getElementById('in-num').value = n;
            document.getElementById('in-anno').value = a;
            document.getElementById('in-rip').value = r;
            document.getElementById('main-btn').innerText = "Conferma Modifica";
            window.scrollTo(0,0);
        }

        function elimina(id) { if(confirm("Eliminare?")) db.child(id).remove(); }

        function toggleStato(id, attuale) {
            const nuovo = attuale === "In sede" ? "Prelevato" : "In sede";
            let nota = nuovo === "Prelevato" ? prompt("A chi?") : "";
            if(nuovo === "Prelevato" && !nota) return;
            db.child(id).update({ stato: nuovo, nota: nota || "" });
        }

        function render(lista) {
            document.getElementById('st-tot').innerText = lista.length;
            document.getElementById('st-sede').innerText = lista.filter(x => x.stato === 'In sede').length;
            document.getElementById('st-fuori').innerText = lista.filter(x => x.stato === 'Prelevato').length;
            const gruppi = [...new Set(lista.map(x => x.gruppo))];
            document.getElementById('st-gruppi').innerText = gruppi.length;
            const html = lista.reverse().map(f => `
                <tr>
                    <td><b>${f.numero}/${f.anno}</b><br><small>${f.gruppo} ${f.nota?'• '+f.nota:''}</small></td>
                    <td><span class="badge ${f.stato==='Prelevato'?'badge-fuori':'badge-sede'}">${f.stato}</span></td>
                    <td style="white-space:nowrap">
                        <button class="action-btn" onclick="toggleStato('${f.id}', '${f.stato}')">🤝</button>
                        <button class="action-btn" onclick="preparaModifica('${f.id}', '${f.numero}', '${f.anno}', '${f.gruppo}')">✏️</button>
                        <button class="action-btn" onclick="elimina('${f.id}')">🗑️</button>
                    </td>
                </tr>`).join('');
            document.getElementById('main-table').innerHTML = html;
            document.getElementById('mini-table').innerHTML = html.slice(0, 5);
            document.getElementById('lista-qr-gruppi').innerHTML = gruppi.map(g => `
                <div class="content-card" style="display:flex; justify-content:space-between; align-items:center">
                    <b>${g}</b><button onclick="stampa('${g}')" class="btn-add" style="width:auto; padding:10px 20px">QR</button>
                </div>`).join('');
        }

        function stampa(g) {
            document.getElementById('p-title').innerText = g;
            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById("qrcode"), { text: window.location.href.split('?')[0] + "?cerca=" + encodeURIComponent(g), width: 250, height: 250 });
            setTimeout(() => { window.print(); }, 800);
        }

        function showPage(p) {
            document.querySelectorAll('.page').forEach(page => page.style.display = 'none');
            document.getElementById('page-' + p).style.display = 'block';
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            const map = {'dashboard':'n-dash', 'lista':'n-list', 'qr-sect':'n-qr'};
            document.getElementById(map[p]).classList.add('active');
        }
    </script>
</body>
</html>
