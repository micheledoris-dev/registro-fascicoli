
<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archivio Sentenze Cloud</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.1/qrcode.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { background-color: #F2F2F7; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .apple-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); border-radius: 20px; border: 1px solid rgba(0,0,0,0.05); }
        #modal { display: none; }
        #modal.active { display: flex !important; }
        @media print { .no-print { display: none !important; } #print-area { display: block !important; } }
        #print-area { display: none; text-align: center; padding: 40px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .online { background-color: #34C759; box-shadow: 0 0 8px #34C759; }
    </style>
</head>
<body class="p-4 md:p-8">

<div class="max-w-6xl mx-auto no-print">
    <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
        <div>
            <h1 class="text-3xl font-extrabold tracking-tight text-gray-900">📁 Archivio Sentenze</h1>
            <div class="flex items-center mt-1">
                <span class="status-dot online"></span>
                <span id="sync-text" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Sincronizzato Cloud</span>
            </div>
        </div>
        <div class="flex gap-2 w-full md:w-auto">
            <button onclick="document.getElementById('file-in').click()" class="flex-1 md:flex-none bg-white border px-4 py-2 rounded-xl text-sm font-medium shadow-sm hover:bg-gray-50 transition">Importa</button>
            <button onclick="exportExcel()" class="flex-1 md:flex-none bg-white border px-4 py-2 rounded-xl text-sm font-medium shadow-sm hover:bg-gray-50 transition">Esporta</button>
            <button onclick="openModal()" class="flex-1 md:flex-none bg-blue-600 text-white px-6 py-2 rounded-xl text-sm font-bold shadow-lg hover:bg-blue-700 transition">＋ Nuovo</button>
        </div>
    </header>

    <div class="apple-card p-4 mb-6 shadow-sm">
        <input type="text" id="search" placeholder="Cerca per numero, anno o posizione..." onkeyup="filter()" class="w-full bg-transparent border-none outline-none text-lg placeholder-gray-300">
    </div>

    <div class="apple-card overflow-hidden shadow-xl border border-gray-100">
        <div class="overflow-x-auto">
            <table class="w-full text-left">
                <thead class="bg-gray-50/50 border-b border-gray-100">
                    <tr>
                        <th class="p-4 text-xs font-bold text-gray-400 uppercase">Fascicolo</th>
                        <th class="p-4 text-xs font-bold text-gray-400 uppercase">Registro</th>
                        <th class="p-4 text-xs font-bold text-gray-400 uppercase">Gruppo / Posizione</th>
                        <th class="p-4 text-xs font-bold text-gray-400 uppercase">Stato</th>
                        <th class="p-4 text-xs font-bold text-gray-400 uppercase text-right">Azioni</th>
                    </tr>
                </thead>
                <tbody id="table-body" class="divide-y divide-gray-100 bg-white/50 text-sm">
                    <tr><td colspan="5" class="p-10 text-center text-gray-400 italic">Caricamento database...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div id="modal" class="fixed inset-0 bg-black/30 backdrop-blur-md z-50 items-center justify-center p-4">
    <div class="bg-white p-6 md:p-8 rounded-[30px] w-full max-w-md shadow-2xl">
        <h2 id="m-title" class="text-2xl font-bold mb-6 text-gray-800">Dettagli Fascicolo</h2>
        <div class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase ml-2">Numero</label>
                    <input type="text" id="m-num" class="w-full p-3 bg-gray-50 rounded-xl border-none ring-1 ring-gray-200 focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase ml-2">Anno</label>
                    <input type="text" id="m-anno" class="w-full p-3 bg-gray-50 rounded-xl border-none ring-1 ring-gray-200 focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
            </div>
            <div>
                <label class="text-[10px] font-bold text-gray-400 uppercase ml-2">Registro</label>
                <input type="text" id="m-reg" class="w-full p-3 bg-gray-50 rounded-xl border-none ring-1 ring-gray-200 focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <div>
                <label class="text-[10px] font-bold text-gray-400 uppercase ml-2">Gruppo (Posizione Fisica)</label>
                <input type="text" id="m-gruppo" class="w-full p-3 bg-gray-50 rounded-xl border-none ring-1 ring-gray-200 focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <div>
                <label class="text-[10px] font-bold text-gray-400 uppercase ml-2">Stato Operativo</label>
                <input type="text" id="m-stato" class="w-full p-3 bg-gray-50 rounded-xl border-none ring-1 ring-gray-200 focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
        </div>
        <div class="flex justify-end gap-3 mt-8">
            <button onclick="closeModal()" class="px-5 py-2 text-sm font-semibold text-gray-400 hover:text-gray-600">Annulla</button>
            <button onclick="save()" class="bg-blue-600 text-white px-8 py-2 rounded-xl text-sm font-bold shadow-lg hover:bg-blue-700">Salva Cloud</button>
        </div>
    </div>
</div>

<div id="print-area">
    <h1 id="p-label" style="font-size: 38px; font-weight: 900; margin-bottom: 20px;"></h1>
    <div id="p-qr" style="display: flex; justify-content: center;"></div>
    <p style="margin-top: 20px; font-size: 14px; color: #666;">Scansiona per localizzare il gruppo</p>
</div>

<input type="file" id="file-in" hidden onchange="importXLS(event)">

<script>
    // --- CONFIGURAZIONE FIREBASE ---
    const firebaseConfig = {
      apiKey: "AIzaSyC4PA_joHtGFRudPUYBOQAMrOgVearBt3I",
      authDomain: "archivio-sentenze.firebaseapp.com",
      databaseURL: "https://archivio-sentenze-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "archivio-sentenze",
      storageBucket: "archivio-sentenze.firebasestorage.app",
      messagingSenderId: "139447095387",
      appId: "1:139447095387:web:32d031468fa4c74a83af7e",
      measurementId: "G-9NMKDSJ6JB"
    };

    // Inizializzazione
    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref('sentenze');
    let fullData = [];
    let currentKey = null;

    // Sincronizzazione Realtime
    dbRef.on('value', (snapshot) => {
        const val = snapshot.val();
        fullData = val ? Object.keys(val).map(k => ({...val[k], fbKey: k})) : [];
        render();
        document.getElementById('sync-text').innerText = `Sincronizzato Cloud (${fullData.length})`;
    });

    function render() {
        const body = document.getElementById('table-body');
        if (fullData.length === 0) {
            body.innerHTML = '<tr><td colspan="5" class="p-10 text-center text-gray-400 italic">Nessun dato presente nel Cloud. Importa un file o aggiungi nuovo.</td></tr>';
            return;
        }
        body.innerHTML = fullData.map(i => `
            <tr class="hover:bg-blue-50/50 transition border-b border-gray-50 last:border-0">
                <td class="p-4 font-bold text-blue-600">${i.num} / ${i.anno}</td>
                <td class="p-4 text-gray-500 font-medium">${i.reg || '-'}</td>
                <td class="p-4 font-semibold text-gray-800">${i.gruppo}</td>
                <td class="p-4">
                    <span class="px-2 py-1 bg-green-100 text-green-700 rounded-md text-[10px] font-black uppercase tracking-tighter">
                        ${i.stato || 'Archiviato'}
                    </span>
                </td>
                <td class="p-4 text-right space-x-1">
                    <button onclick="doPrint('${i.gruppo}')" class="text-[10px] font-bold bg-gray-100 px-3 py-1.5 rounded-lg hover:bg-black hover:text-white transition uppercase">QR</button>
                    <button onclick="openModal('${i.fbKey}')" class="p-2 text-gray-300 hover:text-blue-600 transition">✏️</button>
                    <button onclick="secureDelete('${i.fbKey}')" class="p-2 text-gray-300 hover:text-red-600 transition">🗑️</button>
                </td>
            </tr>
        `).join('');
    }

    function save() {
        const obj = {
            num: document.getElementById('m-num').value,
            anno: document.getElementById('m-anno').value,
            reg: document.getElementById('m-reg').value,
            gruppo: document.getElementById('m-gruppo').value,
            stato: document.getElementById('m-stato').value || "In archivio"
        };
        if(!obj.num || !obj.anno) return alert("Numero e Anno sono obbligatori!");

        if(currentKey) dbRef.child(currentKey).set(obj);
        else dbRef.push(obj);
        
        closeModal();
    }

    function secureDelete(key) {
        if(confirm("Vuoi eliminare definitivamente questa riga dal Cloud?")) {
            let p = prompt("Scrivi ELIMINA per confermare:");
            if(p === "ELIMINA") dbRef.child(key).remove();
        }
    }

    function openModal(key = null) {
        currentKey = key;
        document.getElementById('m-title').
