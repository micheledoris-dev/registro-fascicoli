<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archivio Fascicoli - Pro</title>
    
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.1/qrcode.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { background-color: #F5F5F7; font-family: -apple-system, sans-serif; }
        .apple-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); border-radius: 20px; border: 1px solid rgba(255,255,255,0.4); }
        @media print { .no-print { display: none !important; } #print-area { display: block !important; } }
        #print-area { display: none; text-align: center; padding: 50px; }
    </style>
</head>
<body class="p-4 md:p-8">

<div class="max-w-6xl mx-auto no-print">
    <header class="flex justify-between items-center mb-8">
        <h1 class="text-3xl font-bold">📁 Archivio Digitale</h1>
        <div class="flex gap-2">
            <button onclick="document.getElementById('file-in').click()" class="bg-white border px-4 py-2 rounded-xl text-sm shadow-sm hover:bg-gray-50">Importa Excel</button>
            <button onclick="exportExcel()" class="bg-white border px-4 py-2 rounded-xl text-sm shadow-sm hover:bg-gray-50">Esporta Excel</button>
            <button onclick="openModal()" class="bg-blue-600 text-white px-6 py-2 rounded-xl text-sm font-medium shadow-md">＋ Nuovo</button>
        </div>
    </header>

    <div class="apple-card p-4 mb-6 shadow-sm">
        <input type="text" id="search" placeholder="Cerca numero, anno o posizione..." onkeyup="filter()" class="w-full bg-transparent border-none outline-none text-lg">
    </div>

    <div class="apple-card overflow-hidden shadow-lg">
        <table class="w-full text-left">
            <thead class="bg-gray-50 border-b border-gray-100">
                <tr>
                    <th class="p-4 text-xs font-bold text-gray-400 uppercase">Fascicolo</th>
                    <th class="p-4 text-xs font-bold text-gray-400 uppercase">Registro</th>
                    <th class="p-4 text-xs font-bold text-gray-400 uppercase">Gruppo / Posizione</th>
                    <th class="p-4 text-xs font-bold text-gray-400 uppercase">Stato</th>
                    <th class="p-4 text-xs font-bold text-gray-400 uppercase text-right">Azioni</th>
                </tr>
            </thead>
            <tbody id="table-body" class="divide-y divide-gray-50"></tbody>
        </table>
    </div>
</div>

<div id="modal" class="fixed inset-0 bg-black/30 backdrop-blur-md hidden items-center justify-center z-50 no-print">
    <div class="bg-white p-8 rounded-[30px] w-full max-w-md shadow-2xl mx-4">
        <h2 id="m-title" class="text-2xl font-bold mb-6">Dettagli Fascicolo</h2>
        <div class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <input type="text" id="m-num" placeholder="Numero" class="p-3 bg-gray-50 rounded-xl border-none ring-1 ring-gray-200 focus:ring-blue-500">
                <input type="text" id="m-anno" placeholder="Anno" class="p-3 bg-gray-50 rounded-xl border-none ring-1 ring-gray-200 focus:ring-blue-500">
            </div>
            <input type="text" id="m-reg" placeholder="Registro" class="w-full p-3 bg-gray-50 rounded-xl border-none ring-1 ring-gray-200 focus:ring-blue-500">
            <input type="text" id="m-gruppo" placeholder="Gruppo (Ripiano/Fila)" class="w-full p-3 bg-gray-50 rounded-xl border-none ring-1 ring-gray-200 focus:ring-blue-500">
            <input type="text" id="m-stato" placeholder="Stato (es. In archivio)" class="w-full p-3 bg-gray-50 rounded-xl border-none ring-1 ring-gray-200 focus:ring-blue-500">
        </div>
        <div class="flex justify-end gap-3 mt-8">
            <button onclick="closeModal()" class="px-4 py-2 text-gray-400 font-medium">Chiudi</button>
            <button onclick="save()" class="bg-blue-600 text-white px-8 py-2 rounded-xl shadow-lg">Salva</button>
        </div>
    </div>
</div>

<div id="print-area">
    <h1 id="p-label" style="font-size: 40px; margin-bottom: 20px;"></h1>
    <div id="p-qr" style="display: flex; justify-content: center;"></div>
</div>

<input type="file" id="file-in" hidden onchange="importXLS(event)">

    let currentEditId = null;

        body.innerHTML = db.map(i => `
