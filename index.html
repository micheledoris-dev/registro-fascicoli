<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archivio Fascicoli Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body { background-color: #F5F5F7; font-family: 'Inter', -apple-system, sans-serif; color: #1d1d1f; }
        .glass { background: rgba(255, 255, 255, 0.72); backdrop-filter: saturate(180%) blur(20px); border: 1px solid rgba(255,255,255,0.3); }
        .apple-shadow { box-shadow: 0 8px 30px rgba(0,0,0,0.04); }
        .btn-apple { background-color: #0071E3; transition: all 0.2s ease; }
        .btn-apple:hover { background-color: #0077ED; transform: scale(1.02); }
        .btn-apple:active { transform: scale(0.98); }
        @media print { .no-print { display: none !important; } #printArea { display: block !important; } }
    </style>
</head>
<body class="p-4 md:p-8">

<div class="max-w-7xl mx-auto no-print">
    <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
        <div>
            <h1 class="text-4xl font-semibold tracking-tight">Archivio Digitale</h1>
            <p class="text-gray-500 text-sm">Gestione fascicoli con doppia sicurezza</p>
        </div>
        <div class="flex gap-3">
            <button onclick="document.getElementById('fileIn').click()" class="bg-white border px-5 py-2 rounded-full text-sm font-medium apple-shadow hover:bg-gray-50">Importa Excel</button>
            <input type="file" id="fileIn" class="hidden" accept=".xlsx" onchange="importaExcel(event)">
            <button onclick="esportaExcel()" class="bg-black text-white px-5 py-2 rounded-full text-sm font-medium apple-shadow">Esporta Excel</button>
        </div>
    </header>

    <div class="glass p-6 rounded-[24px] apple-shadow mb-8">
        <h2 class="text-lg font-semibold mb-4 text-blue-600">Inserisci Nuovo Fascicolo</h2>
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <input id="num" type="text" placeholder="Numero Fascicolo" class="p-3 rounded-xl border bg-white/50 focus:ring-2 focus:ring-blue-400 outline-none">
            <input id="anno" type="text" placeholder="Anno" class="p-3 rounded-xl border bg-white/50 focus:ring-2 focus:ring-blue-400 outline-none">
            <input id="reg" type="text" placeholder="Numero Registro" class="p-3 rounded-xl border bg-white/50 focus:ring-2 focus:ring-blue-400 outline-none">
            <input id="gruppo" type="text" placeholder="Gruppo di appartenenza" class="p-3 rounded-xl border bg-white/50 focus:ring-2 focus:ring-blue-400 outline-none">
            <input id="note" type="text" placeholder="Note aggiuntive" class="p-3 rounded-xl border bg-white/50 focus:ring-2 focus:ring-blue-400 outline-none col-span-1 md:col-span-2">
            <input id="preleva" type="text" placeholder="Nome chi preleva" class="p-3 rounded-xl border bg-white/50 focus:ring-2 focus:ring-blue-400 outline-none">
            <input id="ripone" type="text" placeholder="Nome chi ripone" class="p-3 rounded-xl border bg-white/50 focus:ring-2 focus:ring-blue-400 outline-none">
            <button onclick="aggiungiRecord()" class="btn-apple text-white font-semibold py-3 rounded-xl col-span-1 md:col-span-4">Salva nel Database</button>
        </div>
    </div>

    <div class="glass rounded-[24px] apple-shadow overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-left">
                <thead class="bg-gray-100/50">
                    <tr>
                        <th class="p-4 text-xs uppercase text-gray-400 font-bold">Fascicolo/Anno</th>
                        <th class="p-4 text-xs uppercase text-gray-400 font-bold">Registro</th>
                        <th class="p-4 text-xs uppercase text-gray-400 font-bold">Gruppo</th>
                        <th class="p-4 text-xs uppercase text-gray-400 font-bold">Log Prelievo/Riposizione</th>
                        <th class="p-4 text-xs uppercase text-gray-400 font-bold text-right">Azioni</th>
                    </tr>
                </thead>
                <tbody id="listaFascicoli" class="divide-y divide-gray-100"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="printArea" class="hidden bg-white min-h-screen p-10 text-center">
    <div class="border-4 border-black p-20 inline-block rounded-3xl">
        <h1 id="printGruppo" class="text-6xl font-bold mb-10 text-uppercase tracking-tighter"></h1>
        <div id="qrcode" class="flex justify-center mb-10"></div>
        <p class="text-2xl font-light">Etichetta Archivio Digitale</p>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('archivio_digitale')) || [];

    function salva() {
        localStorage.setItem('archivio_digitale', JSON.stringify(db));
        render();
    }

    function aggiungiRecord() {
        const record = {
            id: Date.now(),
            numero: document.getElementById('num').value,
            anno: document.getElementById('anno').value,
            registro: document.getElementById('reg').value,
            gruppo: document.getElementById('gruppo').value,
